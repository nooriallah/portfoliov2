<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Apply saved/system theme before paint to avoid a flash
      (function () {
        try {
          var s = localStorage.getItem("theme");
          var dark = s
            ? s === "dark"
            : window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <link
      rel="icon"
      type="image/webp"
      href="https://nooriallah.netlify.app/img/logo.webp"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#007bff" />
    <meta
      name="description"
      content="Noorullah Qayoumi — Web Developer, Programmer & Freelancer."
    />

    <title>Noorullah Qayoumi — Web Developer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />

</html>
